project:
  name: DataQualityTest
  version: 0.1.0
  description: 'MERIDIAN project: DataQualityTest'
llm:
  provider: anthropic
  model: claude-3-haiku-20240307
  temperature: 0.3
  max_tokens: 4096
  intelligence:
    enabled: true
    memory: true
    few_shot: true
    optimization: true
data:
  default_path: data/
  cache_enabled: true
artifacts:
  retention_days: 30
  auto_verify: true
execution:
  parallel_enabled: false
  timeout_seconds: 3600
